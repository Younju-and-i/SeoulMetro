services:
  web-sub1:
    image: nginx:1.28
    container_name: web-sub1
    ports:
      - "80:80" 
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/config:/etc/nginx/conf.d:ro
  backend:
    image: uv:1
    container_name: backend
    volumes:
      - ./backend:/workspace
    command: ["uv", "run", "fastapi", "run", "--proxy-headers", "--forwarded-allow-ips", "'*'"]

# 5. 데이터베이스 (PostgreSQL) - 지하철 적재 데이터 저장용
  db:
    image: mariadb:12.1.2
    container_name: db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: seoul_metro
    volumes:
      - data-mariadb:/var/lib/mysql:rw
    ports:
      - "5432:5432"

  # 6. Spark Master - 클러스터 관리자
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    ports:
      - "8080:8080" # Spark 관리 도구(Web UI)
      - "7077:7077" # 마스터 통신용
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]

  # 7. Spark Worker 1 - 실제 계산 수행
  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

  # 8. Spark Worker 2 - 실제 계산 수행
  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]

volumes:
  app2_spark-work-1:
  app2_spark-work-2:
  data-mariadb:
    external: true # 기존 Volume 사용 옵션